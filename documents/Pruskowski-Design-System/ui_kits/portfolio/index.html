<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Pruskowski — Portfolio UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #fffafa;
      color: #111;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      overflow-x: hidden;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    @keyframes marqueeRev {
      from { transform: translateX(-50%); }
      to   { transform: translateX(0); }
    }

    .mat-icon {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga';
      font-size: 22px;
      line-height: 1;
      font-style: normal;
      font-weight: normal;
      text-transform: none;
      letter-spacing: normal;
      white-space: nowrap;
      -webkit-font-smoothing: antialiased;
      color: #D32F2F;
      display: block;
      margin-bottom: 20px;
    }

    /* Tweaks panel */
    #tweaks-panel {
      display: none;
      position: fixed;
      bottom: 24px; right: 24px;
      background: #111; color: #fff;
      padding: 20px; z-index: 9999;
      width: 240px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #tweaks-panel.active { display: block; }
    .tweak-label { letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 6px; font-size: 8px; }
    .tweak-row { margin-bottom: 14px; }
    .tweak-row select, .tweak-row input[type=range] { width: 100%; background: #222; color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 4px; font-family: inherit; font-size: 9px; }
    .tweak-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #fff; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 10px; }
  </style>
</head>
<body>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#D32F2F",
  "heroSize": "large"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('mp-tweaks')) || TWEAK_DEFAULTS; } catch { return TWEAK_DEFAULTS; }
  });

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    localStorage.setItem('mp-tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    // Apply CSS var live
    if (key === 'accentColor') document.documentElement.style.setProperty('--accent', val);
  };

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor || '#D32F2F');
  }, [tweaks.accentColor]);

  return (
    <>
      <Nav />
      <Hero heroSize={tweaks.heroSize} />

      {/* Brand strip */}
      <section style={{borderBottom:'1px solid rgba(17,17,17,0.13)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1.1rem 2rem',borderBottom:'1px solid rgba(17,17,17,0.13)',background:'rgba(17,17,17,0.02)'}}>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:9.6,letterSpacing:'0.2em',textTransform:'uppercase',color:'rgba(17,17,17,0.42)'}}>Brand Portfolio</span>
        </div>
        <BrandStrip />
      </section>

      <MarqueeStrip />
      <SectionHeader num="01" title="Capabilities" right="What I bring to the table" />
      <ApproachSection />
      <QuoteSection />
      <SectionHeader num="02" title="Experience" right="20+ years driving results" />
      <ServicesSection />
      <CTABand />
      <SectionHeader num="03" title="Connect" right="Get in touch" />
      <ContactSection />
      <Footer />

      {/* Tweaks panel */}
      <div id="tweaks-panel">
        <div className="tweak-title">Tweaks</div>
        <div className="tweak-row">
          <div className="tweak-label">Accent Color</div>
          <select value={tweaks.accentColor} onChange={e => updateTweak('accentColor', e.target.value)}>
            <option value="#D32F2F">Brand Red — #D32F2F</option>
            <option value="#1565C0">Deep Blue — #1565C0</option>
            <option value="#2E7D32">Forest Green — #2E7D32</option>
            <option value="#4A148C">Deep Purple — #4A148C</option>
            <option value="#111111">Monochrome — #111111</option>
          </select>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Hero Size</div>
          <select value={tweaks.heroSize} onChange={e => updateTweak('heroSize', e.target.value)}>
            <option value="large">Large (default)</option>
            <option value="compact">Compact</option>
          </select>
        </div>
      </div>
    </>
  );
}

// Tweaks edit mode
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('active');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('active');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

document.fonts.ready.then(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
});
</script>

<div id="root"></div>

</body>
</html>
