<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffafa; padding: 24px 28px; }
.specimen { margin-bottom: 10px; border-bottom: 1px solid rgba(17,17,17,0.1); padding-bottom: 10px; display: flex; align-items: baseline; gap: 20px; }
.specimen:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(17,17,17,0.35); width: 80px; flex-shrink: 0; line-height: 1.4; }
.text { font-family: 'Cormorant Garamond', serif; color: #111; }
</style></head><body>
<div class="specimen">
  <div class="label">Hero / 300</div>
  <div class="text" style="font-size:56px;font-weight:300;line-height:0.9;letter-spacing:-0.03em;">Brands to <em style="color:#D32F2F;font-style:italic;">Billions.</em></div>
</div>
<div class="specimen">
  <div class="label">H2 / 300</div>
  <div class="text" style="font-size:36px;font-weight:300;line-height:1.05;letter-spacing:-0.02em;">Brand Strategy: Transform complexity into <em style="color:#D32F2F;font-style:italic;">clarity.</em></div>
</div>
<div class="specimen">
  <div class="label">H3 / 300</div>
  <div class="text" style="font-size:28px;font-weight:300;line-height:1.1;letter-spacing:-0.01em;">Brand Narrative Leadership</div>
</div>
<div class="specimen">
  <div class="label">Quote / 400i</div>
  <div class="text" style="font-size:22px;font-weight:400;font-style:italic;line-height:1.4;">"The work isn't done when it ships. It's done when someone, somewhere, quietly trusts it."</div>
</div>
</body></html>
