<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffafa; padding: 20px 24px; }
.label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(17,17,17,0.35); margin-bottom: 16px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid rgba(17,17,17,0.13); border-left: 1px solid rgba(17,17,17,0.13); }
.icon-cell { padding: 14px 12px; border-right: 1px solid rgba(17,17,17,0.13); border-bottom: 1px solid rgba(17,17,17,0.13); }
.icon {
  font-family: 'Material Symbols Outlined';
  font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  font-size: 22px; line-height: 1; font-weight: normal; font-style: normal;
  display: block; margin-bottom: 6px; color: #D32F2F;
}
.name { font-family: 'Space Mono', monospace; font-size: 7.5px; letter-spacing: 0.08em; color: rgba(17,17,17,0.4); }
</style></head><body>
<div class="label">Material Symbols Outlined — wght 300, FILL 0</div>
<div class="grid">
  <div class="icon-cell"><span class="icon">legend_toggle</span><div class="name">legend_toggle</div></div>
  <div class="icon-cell"><span class="icon">integration_instructions</span><div class="name">integration_instructions</div></div>
  <div class="icon-cell"><span class="icon">person_check</span><div class="name">person_check</div></div>
  <div class="icon-cell"><span class="icon">account_tree</span><div class="name">account_tree</div></div>
  <div class="icon-cell"><span class="icon">trending_up</span><div class="name">trending_up</div></div>
  <div class="icon-cell"><span class="icon">monitor_heart</span><div class="name">monitor_heart</div></div>
  <div class="icon-cell"><span class="icon">auto_awesome</span><div class="name">auto_awesome</div></div>
  <div class="icon-cell"><span class="icon">groups</span><div class="name">groups</div></div>
</div>
</body></html>
