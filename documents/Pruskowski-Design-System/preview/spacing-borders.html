<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffafa; padding: 24px 28px; }
.label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(17,17,17,0.35); margin-bottom: 14px; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: rgba(17,17,17,0.13); border: 1px solid rgba(17,17,17,0.13); margin-bottom: 16px; }
.cell { background: #fffafa; padding: 10px; }
.border-demo { display: flex; gap: 16px; align-items: center; }
.border-box { width: 60px; height: 40px; }
.border-label { font-family: 'Space Mono', monospace; font-size: 8px; color: rgba(17,17,17,0.35); letter-spacing: 0.1em; text-transform: uppercase; }
.radius-row { display: flex; gap: 16px; align-items: center; margin-top: 12px; }
.radius-box { width: 50px; height: 36px; background: rgba(17,17,17,0.08); border: 1px solid rgba(17,17,17,0.2); }
</style></head><body>
<div class="label">Grid System — 1px Rule Borders</div>
<div class="grid">
  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
</div>
<div class="border-demo">
  <div>
    <div class="border-box" style="border: 1px solid rgba(17,17,17,0.13);"></div>
    <div class="border-label" style="margin-top:4px;">--rule (13%)</div>
  </div>
  <div>
    <div class="border-box" style="border: 1px solid #111;"></div>
    <div class="border-label" style="margin-top:4px;">--text (btn)</div>
  </div>
  <div>
    <div class="border-box" style="border: 1px solid #D32F2F;"></div>
    <div class="border-label" style="margin-top:4px;">--accent (btn fill)</div>
  </div>
</div>
<div class="radius-row">
  <div>
    <div class="radius-box" style="border-radius:0;"></div>
    <div class="border-label" style="margin-top:4px;">radius-none (default)</div>
  </div>
  <div>
    <div class="radius-box" style="border-radius:8px;"></div>
    <div class="border-label" style="margin-top:4px;">radius-sm (images only)</div>
  </div>
</div>
</body></html>
