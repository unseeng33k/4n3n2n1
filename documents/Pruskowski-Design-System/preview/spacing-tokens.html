<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffafa; padding: 24px 28px; }
.row { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(17,17,17,0.09); }
.row:last-child { border-bottom: none; }
.label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(17,17,17,0.35); width: 80px; flex-shrink: 0; }
.bar { background: #111; height: 6px; }
.val { font-family: 'Space Mono', monospace; font-size: 8px; color: rgba(17,17,17,0.35); width: 50px; flex-shrink: 0; text-align: right; }
</style></head><body>
<div class="row"><div class="label">xs / 0.5rem</div><div class="bar" style="width:8px;"></div><div class="val">8px</div></div>
<div class="row"><div class="label">sm / 1rem</div><div class="bar" style="width:16px;"></div><div class="val">16px</div></div>
<div class="row"><div class="label">md / 2rem</div><div class="bar" style="width:32px;"></div><div class="val">32px</div></div>
<div class="row"><div class="label">lg / 3.5rem</div><div class="bar" style="width:56px;"></div><div class="val">56px</div></div>
<div class="row"><div class="label">xl / 5rem</div><div class="bar" style="width:80px;"></div><div class="val">80px</div></div>
<div class="row"><div class="label">2xl / 8rem</div><div class="bar" style="width:128px;"></div><div class="val">128px</div></div>
<div class="row"><div class="label">Nav height</div><div class="bar" style="width:52px;background:#D32F2F;"></div><div class="val">52px</div></div>
<div class="row"><div class="label">Gutter</div><div class="bar" style="width:32px;background:rgba(211,47,47,0.4);"></div><div class="val">2rem</div></div>
</body></html>
