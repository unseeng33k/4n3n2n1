<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffafa; padding: 28px; display: flex; flex-direction: column; gap: 20px; }
.row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(17,17,17,0.35); width: 80px; flex-shrink: 0; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 22px;
  font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 1px solid #111; color: #111; background: transparent;
  cursor: pointer; text-decoration: none;
}
.btn-fill { background: #D32F2F; border-color: #D32F2F; color: #fff; }
.btn-fill-hover { background: #E57373; border-color: #E57373; color: #fff; }
.btn-white { background: transparent; border-color: rgba(255,255,255,0.4); color: #fff; }
.dark-bg { background: #D32F2F; padding: 12px 16px; display: inline-flex; gap: 12px; }
</style></head><body>
<div class="row">
  <div class="label">Outline</div>
  <div class="btn">See Capabilities</div>
  <div class="btn" style="background:#F5F5F5;">Hover State</div>
</div>
<div class="row">
  <div class="label">Fill</div>
  <div class="btn btn-fill">Download Resume →</div>
  <div class="btn btn-fill-hover">Hover State →</div>
</div>
<div class="row">
  <div class="label">On Red</div>
  <div class="dark-bg">
    <div class="btn" style="background:#fff;border-color:#fff;color:#D32F2F;">Let's Talk →</div>
    <div class="btn btn-white">See Capabilities</div>
  </div>
</div>
</body></html>
