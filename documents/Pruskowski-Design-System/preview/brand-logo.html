<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffafa; padding: 24px 28px; }
.label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(17,17,17,0.35); margin-bottom: 12px; }
.logo-row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
.logo { display: flex; align-items: center; gap: 8px; }
.mark { display: grid; grid-template-columns: 1fr 1fr; }
.q { width: 10px; height: 10px; }
.wordmark { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.foot { display: flex; align-items: center; gap: 8px; }
.block { width: 10px; height: 10px; background: #111; }
</style></head><body>
<div class="label">Logo System</div>
<div class="logo-row">
  <div>
    <div style="font-family:'Space Mono',monospace;font-size:7px;color:rgba(17,17,17,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">Primary (Nav)</div>
    <div class="logo">
      <div class="mark">
        <div class="q" style="background:#2563eb;"></div>
        <div class="q" style="background:#dc2626;"></div>
        <div class="q" style="background:#eab308;"></div>
        <div class="q" style="background:#16a34a;"></div>
      </div>
      <div class="wordmark">Michael Pruskowski</div>
    </div>
  </div>
  <div>
    <div style="font-family:'Space Mono',monospace;font-size:7px;color:rgba(17,17,17,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">Footer Variant</div>
    <div class="foot">
      <div class="block"></div>
      <div class="wordmark">Michael Pruskowski</div>
    </div>
  </div>
  <div>
    <div style="font-family:'Space Mono',monospace;font-size:7px;color:rgba(17,17,17,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">Mark Only (Large)</div>
    <div class="mark" style="width:40px;height:40px;">
      <div class="q" style="background:#2563eb;width:20px;height:20px;"></div>
      <div class="q" style="background:#dc2626;width:20px;height:20px;"></div>
      <div class="q" style="background:#eab308;width:20px;height:20px;"></div>
      <div class="q" style="background:#16a34a;width:20px;height:20px;"></div>
    </div>
  </div>
</div>
</body></html>
