<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffafa; font-family: 'Space Mono', monospace; padding: 20px; }
.row { display: flex; gap: 12px; }
.swatch { flex: 1; }
.chip { height: 80px; border: 1px solid rgba(17,17,17,0.08); }
.name { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(17,17,17,0.5); margin-top: 6px; }
.val { font-size: 9px; color: rgba(17,17,17,0.35); margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#fffafa;"></div><div class="name">BG</div><div class="val">#fffafa</div></div>
  <div class="swatch"><div class="chip" style="background:#F5F5F5;"></div><div class="name">BG2</div><div class="val">#F5F5F5</div></div>
  <div class="swatch"><div class="chip" style="background:#111111;"></div><div class="name">Text</div><div class="val">#111111</div></div>
  <div class="swatch"><div class="chip" style="background:rgba(17,17,17,0.42);"></div><div class="name">Muted</div><div class="val">111 @ 42%</div></div>
  <div class="swatch"><div class="chip" style="background:rgba(17,17,17,0.13);"></div><div class="name">Rule</div><div class="val">111 @ 13%</div></div>
  <div class="swatch"><div class="chip" style="background:#D32F2F;"></div><div class="name">Red</div><div class="val">#D32F2F</div></div>
  <div class="swatch"><div class="chip" style="background:#E57373;"></div><div class="name">Red Light</div><div class="val">#E57373</div></div>
</div>
</body></html>
